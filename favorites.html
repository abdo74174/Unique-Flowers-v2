<!DOCTYPE html>
<html class="light" lang="ar">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Favorites | Unique Flowers</title>
    <script src="translations.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=Manrope:wght@200..800&family=Cairo:wght@200..1000&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#715956",
                        "primary-container": "#d2b4b0",
                        "surface": "#fbf9f5",
                        "on-surface": "#1b1c1a",
                        "outline-variant": "#d3c3c1",
                    },
                    fontFamily: {
                        "headline": ["Newsreader"],
                        "body": ["Manrope"],
                    },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .fav-active { font-variation-settings: 'FILL' 1 !important; color: #715956; }
        body { font-family: 'Manrope', sans-serif; background-color: #fbf9f5; }

        /* ── Toast Notifications ── */
        .toast-container {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .toast {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border-left: 4px solid #715956;
            color: #1b1c1a;
            padding: 16px 24px;
            border-radius: 8px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.12);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: toast-in 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-weight: 600;
            font-size: 0.9rem;
            min-width: 280px;
        }
        @keyframes toast-in { 
            from { transform: translateX(100%); opacity: 0; } 
            to { transform: translateX(0); opacity: 1; } 
        }
        html[lang="ar"] .toast { border-left: none; border-right: 4px solid #715956; }
        html[lang="ar"] .toast-container { right: auto; left: 24px; }
    </style>
</head>
<body class="antialiased min-h-screen">
    <header class="bg-stone-50/80 backdrop-blur-md sticky top-0 z-50">
        <div class="flex justify-between items-center w-full px-8 py-6 max-w-screen-2xl mx-auto">
            <div class="flex items-center gap-4">
                <img alt="Logo" class="h-10 w-10 object-contain" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAIOinAq84cURd_sO40JILLII7p1ZoDf3oltenOaYrUQSziF44EpGebqFlAnkf831NjF7X0NlVlHB7mV0CJ67SZHkN-W7iWKWm8i4aDF8wGVRLL8-vjxLU_Ktndlfr6j6rtMRcXx-QJJagE0WkHZ0cvyF8WCs2cQ6d-e_1ezE4qgbMC7-PKqmHIA8o18Nsb0kTsoa4TPafz1Sbvd1i1BuUnTzYdh0gZMcucaAls8iw1L4SRgmpKdZzVSDPN8cktK1RRRfcdmyFmb0Nm" />
                <span class="text-2xl font-headline text-stone-900 italic tracking-tighter" data-i18n="nav.brand">Unique Flowers</span>
            </div>
            <div class="flex items-center gap-6">
                <div class="flex items-center bg-zinc-100 rounded-full p-1 h-8">
                    <button onclick="setLanguage('en')" class="px-2 py-0 text-[10px] font-bold rounded-full transition-all hover:bg-white" id="lang-en">EN</button>
                    <button onclick="setLanguage('ar')" class="px-2 py-0 text-[10px] font-bold rounded-full transition-all hover:bg-white" id="lang-ar">AR</button>
                </div>
                <a class="flex items-center gap-2 text-stone-500 font-label tracking-widest text-[0.6875rem] uppercase hover:text-stone-900 transition-colors" href="index.html">
                    <span class="material-symbols-outlined text-sm">home</span>
                    <span data-i18n="nav.home">Home</span>
                </a>
                <a class="flex items-center gap-2 text-stone-500 font-label tracking-widest text-[0.6875rem] uppercase hover:text-stone-900 transition-colors" href="cart.html">
                    <span class="material-symbols-outlined text-sm">shopping_bag</span>
                    <span data-i18n="nav.cart">Cart</span>
                </a>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-6 py-12 md:py-20">
        <h1 class="font-headline text-4xl mb-12 italic" data-i18n="fav.title">My Favorites</h1>
        
        <div id="fav-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Favorite cards will be injected here -->
            <div id="empty-fav" class="text-center py-20 col-span-full hidden">
                <span class="material-symbols-outlined text-6xl text-stone-200 mb-4">favorite</span>
                <p class="text-stone-500 font-body" data-i18n="fav.empty">You haven't saved any favorites yet.</p>
                <a href="product_Catlog.html" class="mt-6 inline-block text-primary font-bold underline" data-i18n="fav.browse">Explore Flowers</a>
            </div>
        </div>
    </main>

    <script>
        let favorites = JSON.parse(localStorage.getItem('flowerFavorites')) || [];

        function renderFavorites() {
            const container = document.getElementById('fav-container');
            const empty = document.getElementById('empty-fav');
            
            // Clear existing but keep empty message
            const items = container.querySelectorAll('.fav-card');
            items.forEach(el => el.remove());

            if (favorites.length === 0) {
                empty.classList.remove('hidden');
                return;
            }

            empty.classList.add('hidden');

            favorites.forEach((p, index) => {
                const card = document.createElement('div');
                card.className = 'fav-card bg-white rounded-2xl overflow-hidden shadow-sm border border-stone-100/60 group hover:shadow-md transition-all duration-300';
                card.innerHTML = `
                    <div class="relative aspect-[4/5] overflow-hidden">
                        <img src="${p.image}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" />
                        <button onclick="toggleFav(${index})" class="absolute top-4 right-4 w-10 h-10 bg-white/80 backdrop-blur-md rounded-full flex items-center justify-center text-primary shadow-sm hover:bg-white transition-all">
                            <span class="material-symbols-outlined fav-active">favorite</span>
                        </button>
                    </div>
                    <div class="p-6">
                        <h3 class="font-headline text-xl text-stone-900 group-hover:text-primary transition-colors">${p.title}</h3>
                        <p class="text-stone-700 font-bold mt-2 font-body">${p.price} SAR</p>
                        <div class="mt-4 flex gap-2">
                             <button onclick="addToCartFromFav(${index})" class="flex-grow bg-primary text-white py-3 rounded-lg font-bold text-sm hover:opacity-90 transition-all">
                                 Add to Cart
                             </button>
                             <button onclick="viewProduct(${index})" class="px-4 border border-stone-200 rounded-lg text-stone-400 hover:text-stone-600">
                                 <span class="material-symbols-outlined">visibility</span>
                             </button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function showToast(message) {
            let container = document.getElementById('toast-container');
            if (!container) {
                container = document.createElement('div');
                container.id = 'toast-container';
                container.className = 'toast-container';
                document.body.appendChild(container);
            }
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<span class="material-symbols-outlined text-primary">check_circle</span> <span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(-20px)';
                toast.style.transition = 'all 0.5s ease';
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }

        function toggleFav(index) {
            favorites.splice(index, 1);
            localStorage.setItem('flowerFavorites', JSON.stringify(favorites));
            renderFavorites();
            showToast(localStorage.getItem('selectedLanguage') === 'ar' ? 'تمت الإزالة من المفضلات' : 'Removed from favorites');
        }

        function addToCartFromFav(index) {
            const item = favorites[index];
            let cart = JSON.parse(localStorage.getItem('flowerCart')) || [];
            const existing = cart.findIndex(i => i.title === item.title);
            if (existing > -1) {
                cart[index].quantity += 1;
            } else {
                cart.push({ ...item, quantity: 1 });
            }
            localStorage.setItem('flowerCart', JSON.stringify(cart));
            showToast(localStorage.getItem('selectedLanguage') === 'ar' ? 'تمت الإضافة للسلة!' : 'Added to cart!');
        }

        function viewProduct(index) {
            window.location.href = 'product_Catlog.html';
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderFavorites();
            if (typeof setLanguage === 'function') {
                const lang = localStorage.getItem('selectedLanguage') || 'ar';
                setLanguage(lang);
            }
        });
    </script>
</body>
</html>
