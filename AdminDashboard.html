<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Unique Flowers</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --brand-primary: #2a2e22;
            --brand-accent: #d4cfcc;
            --brand-surface: #f7f6f5;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--brand-surface);
            color: var(--brand-primary);
        }

        .font-headline { font-family: 'Playfair Display', serif; }

        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .btn-primary {
            background: var(--brand-primary);
            color: white;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(42, 46, 34, 0.2);
        }

        .input-field {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(0,0,0,0.1);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            width: 100%;
            outline: none;
            transition: all 0.2s;
        }

        .input-field:focus {
            border-color: var(--brand-primary);
            background: white;
        }

        /* Loader Overlay */
        #loaderOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(42, 46, 34, 0.3);
            backdrop-filter: blur(12px);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: all 0.3s ease;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #fff;
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            margin-bottom: 1.5rem;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="p-8">
    <div id="loaderOverlay">
        <div class="spinner"></div>
        <p class="text-xs uppercase tracking-[0.2em] font-medium text-white opacity-80 animate-pulse">Synchronizing Atelier</p>
    </div>
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-12">
            <div>
                <h1 class="font-headline text-4xl mb-2 italic">Dashboard Management</h1>
                <p class="text-secondary opacity-60">Add, Update, and Curate your Botanical Collection.</p>
            </div>
            <a href="product_Catlog.html" class="flex items-center gap-2 text-primary opacity-80 hover:opacity-100 transition-all">
                <span class="material-symbols-outlined">arrow_back</span>
                Back to Catalog
            </a>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
            <!-- Form Section -->
            <div class="lg:col-span-1">
                <div class="glass-card p-8 rounded-3xl shadow-sm sticky top-8">
                    <h2 class="font-headline text-2xl mb-6">Product Curator</h2>
                    <form id="productForm" class="space-y-4">
                        <input type="hidden" id="productId">
                        
                        <div>
                            <label class="text-xs uppercase tracking-widest block mb-2 opacity-60">Category</label>
                            <select id="category" class="input-field" required>
                                <option value="natural">Natural</option>
                                <option value="artificial">Artificial</option>
                                <option value="baby">Baby Gifts</option>
                                <option value="vases">Vases</option>
                                <option value="balloons">Balloons</option>
                                <option value="gifts">Gifts</option>
                            </select>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-xs uppercase tracking-widest block mb-2 opacity-60">Title (EN)</label>
                                <input type="text" id="titleEn" class="input-field" placeholder="Rose Bouquet" required>
                            </div>
                            <div>
                                <label class="text-xs uppercase tracking-widest block mb-2 opacity-60">Title (AR)</label>
                                <input type="text" id="titleAr" class="input-field" dir="rtl" placeholder="باقة ورد" required>
                            </div>
                        </div>

                        <div>
                            <label class="text-xs uppercase tracking-widest block mb-2 opacity-60">Product Image (File or URL)</label>
                            <div class="flex gap-2">
                                <input type="file" id="imageFile" class="input-field text-xs" accept="image/*">
                                <input type="url" id="imageUrl" class="input-field" placeholder="or paste URL">
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-xs uppercase tracking-widest block mb-2 opacity-60">Price (SAR)</label>
                                <input type="number" id="price" class="input-field" placeholder="150" required>
                            </div>
                            <div>
                                <label class="text-xs uppercase tracking-widest block mb-2 opacity-60">Stock</label>
                                <input type="number" id="stock" class="input-field" placeholder="10" required>
                            </div>
                        </div>

                        <div>
                            <label class="text-xs uppercase tracking-widest block mb-2 opacity-60">Description (EN)</label>
                            <textarea id="descEn" class="input-field h-24" placeholder="Freshly cut Roses..."></textarea>
                        </div>

                        <div>
                            <label class="text-xs uppercase tracking-widest block mb-2 opacity-60">Description (AR)</label>
                            <textarea id="descAr" class="input-field h-24" dir="rtl" placeholder="ورد جوري طبيعي..."></textarea>
                        </div>

                        <button type="submit" class="w-full btn-primary py-4 rounded-xl font-medium tracking-wide mt-4 flex items-center justify-center gap-2">
                            <span class="material-symbols-outlined">save</span>
                            <span id="submitLabel">Capture Product</span>
                        </button>
                        <button type="button" id="resetBtn" class="w-full py-2 text-xs opacity-40 hover:opacity-100 transition-all">Clear Form</button>
                    </form>
                </div>
            </div>

            <!-- List Section -->
            <div class="lg:col-span-2">
                <div class="glass-card p-8 rounded-3xl shadow-sm min-h-[600px]">
                    <div class="flex items-center justify-between mb-8">
                        <h2 class="font-headline text-2xl">Active Inventory</h2>
                        <div class="text-xs text-secondary bg-black/5 px-3 py-1 rounded-full"><span id="productCount">0</span> Items found</div>
                    </div>

                    <div id="productList" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <!-- Items injected here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://uniqueflowers.runasp.net/api/products';
        const form = document.getElementById('productForm');
        const productList = document.getElementById('productList');
        const submitLabel = document.getElementById('submitLabel');
        const countLabel = document.getElementById('productCount');

        // Initial Load
        document.addEventListener('DOMContentLoaded', fetchProducts);

        async function fetchProducts() {
            toggleLoader(true);
            try {
                const response = await fetch(API_URL);
                const products = await response.json();
                renderProducts(products);
            } catch (error) {
                console.error('Error fetching products:', error);
            } finally {
                toggleLoader(false);
            }
        }

        function toggleLoader(show) {
            document.getElementById('loaderOverlay').style.display = show ? 'flex' : 'none';
        }

        function renderProducts(products) {
            productList.innerHTML = '';
            countLabel.textContent = products.length;
            
            products.forEach(p => {
                const card = document.createElement('div');
                card.className = 'group relative glass-card p-4 rounded-2xl overflow-hidden hover:shadow-md transition-all border border-black/5';
                card.innerHTML = `
                    <div class="w-full h-40 bg-[#f0f0f0] rounded-xl overflow-hidden mb-4">
                        <img src="${p.imageUrl}" class="w-full h-full object-cover group-hover:scale-105 transition-all" alt="${p.titleEn}">
                    </div>
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <span class="text-[10px] uppercase tracking-tighter text-secondary opacity-40">${p.category}</span>
                            <h3 class="font-medium text-sm leading-tight">${p.titleEn}</h3>
                        </div>
                        <span class="text-sm font-semibold">${p.price} <span class="text-[10px] opacity-40">SAR</span></span>
                    </div>
                    <div class="flex gap-2 mt-4">
                        <button onclick="editProduct(${p.id})" class="flex-1 py-2 text-xs rounded-lg border border-black/10 hover:bg-black/5 transition-all flex items-center justify-center gap-1">
                            <span class="material-symbols-outlined text-[14px]">edit</span> Edit
                        </button>
                        <button onclick="deleteProduct(${p.id})" class="w-10 h-8 flex items-center justify-center rounded-lg border border-red-100 text-red-100 hover:bg-red-50 transition-all">
                            <span class="material-symbols-outlined text-[16px]">delete</span>
                        </button>
                    </div>
                `;
                productList.appendChild(card);
            });
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('productId').value;
            
            toggleLoader(true);
            const submitBtn = e.target.querySelector('button[type="submit"]');
            submitBtn.disabled = true;

            // Use FormData for multipart/form-data
            const formData = new FormData();
            formData.append('titleEn', document.getElementById('titleEn').value);
            formData.append('titleAr', document.getElementById('titleAr').value);
            formData.append('descriptionEn', document.getElementById('descEn').value);
            formData.append('descriptionAr', document.getElementById('descAr').value);
            formData.append('imageUrl', document.getElementById('imageUrl').value);
            formData.append('price', document.getElementById('price').value);
            formData.append('category', document.getElementById('category').value);
            formData.append('stock', document.getElementById('stock').value || 0);
            
            const fileInput = document.getElementById('imageFile');
            if (fileInput.files[0]) {
                formData.append('imageFile', fileInput.files[0]);
            }

            const method = id ? 'PUT' : 'POST';
            const url = id ? `${API_URL}/${id}` : API_URL;

            try {
                const res = await fetch(url, {
                    method: method,
                    body: formData // No Content-Type header needed for FormData
                });

                if (res.ok) {
                    form.reset();
                    document.getElementById('productId').value = '';
                    submitLabel.textContent = 'Capture Product';
                    await fetchProducts();
                } else {
                    const err = await res.json();
                    alert('Error: ' + JSON.stringify(err.errors || err.message));
                }
            } catch (error) {
                alert('Connection failure');
            } finally {
                toggleLoader(false);
                submitBtn.disabled = false;
            }
        });

        async function editProduct(id) {
            try {
                const res = await fetch(`${API_URL}/${id}`);
                const p = await res.json();
                
                document.getElementById('productId').value = p.id;
                document.getElementById('titleEn').value = p.titleEn;
                document.getElementById('titleAr').value = p.titleAr;
                document.getElementById('descEn').value = p.descriptionEn;
                document.getElementById('descAr').value = p.descriptionAr;
                document.getElementById('imageUrl').value = p.imageUrl;
                document.getElementById('price').value = p.price;
                document.getElementById('category').value = p.category;
                document.getElementById('stock').value = p.stock || 0;
                
                submitLabel.textContent = 'Update Product';
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } catch (error) {
                console.error(error);
            }
        }

        async function deleteProduct(id) {
            if(!confirm('Are you sure you want to remove this piece from the atelier?')) return;
            toggleLoader(true);
            try {
                const res = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                if(res.ok) await fetchProducts();
            } catch (error) {
                console.error(error);
                toggleLoader(false);
            }
        }

        document.getElementById('resetBtn').addEventListener('click', () => {
            form.reset();
            document.getElementById('productId').value = '';
            submitLabel.textContent = 'Capture Product';
        });
    </script>
</body>
</html>
